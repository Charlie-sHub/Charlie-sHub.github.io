name: charlie_shub_portfolio
description: Portfolio website built with Flutter Web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  dartz: ^0.10.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  meta: ^1.17.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.13.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  mockito: ^5.4.5
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    # Flutter only bundles direct files from listed directories, so these
    # entries point at the leaf folders that actually contain repo assets.
    - assets/content/about/
    - assets/content/case_studies/
    - assets/content/certifications/
    - assets/content/courses/
    - assets/content/projects/
    - assets/content/resume/
    - assets/media/background.jpg
    - assets/media/content/about/about_me/
    - assets/media/content/projects/world_on/
    - assets/documents/certifications/
    - assets/documents/resume/
  fonts:
    - family: Geometria
      fonts:
        - asset: assets/fonts/geometria/Geometria.ttf
          weight: 400
        - asset: assets/fonts/geometria/Geometria-Medium.ttf
          weight: 500
        - asset: assets/fonts/geometria/Geometria-Bold.ttf
          weight: 700
